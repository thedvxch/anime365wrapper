name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # нужно для доверенной публикации (OIDC) без npm-токена

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # trusted publishing требует npm >= 11.5.1
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --provenance --access public
